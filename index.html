<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploring Agentic Visual Analytics: A Co-Evolutionary Framework of Roles and Workflows</title>
    <link rel="preload" href="styles.css" as="style">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 selection:bg-indigo-100 flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-2 cursor-pointer" onclick="navigate('home')">
                    <div class="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center">
                        <span data-icon="activity" class="w-5 h-5"></span>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-800 hidden sm:block">Exploring Agentic Visual Analytics</span>
                </div>
                <div class="flex items-center space-x-1 sm:space-x-4">
                    <button id="nav-home" onclick="navigate('home')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium transition-colors flex items-center">
                        <span data-icon="home" class="w-4 h-4 mr-1.5 hidden sm:block"></span> Home
                    </button>
                    <button id="nav-search" onclick="navigate('search')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium transition-colors flex items-center">
                        <span data-icon="search" class="w-4 h-4 mr-1.5 hidden sm:block"></span> Corpus Search
                    </button>
                    <button id="nav-guidance" onclick="navigate('guidance')" class="nav-btn px-3 py-2 rounded-md text-sm font-medium transition-colors flex items-center">
                        <span data-icon="book-open" class="w-4 h-4 mr-1.5 hidden sm:block"></span> Guidance
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 flex-grow w-full">
        <!-- Content injected via JS -->
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 mt-auto py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
            <p>Based on "Exploring Agentic Visual Analytics: A Co-Evolutionary Framework of Roles and Workflows"</p>
        </div>
    </footer>

    <script src="js/site-bundle.js"></script>
    <script>
        function hydrateDataIcons(root) {
            root.querySelectorAll('[data-icon]').forEach((el) => {
                const name = el.getAttribute('data-icon');
                el.outerHTML = icn(name, el.className);
            });
        }

        // --- DATA: prefer window.__APP_DATA__ from js/site-bundle.js; else fetch data/*.json ---
        let PAPER_DATA = [];
        let WORKFLOW_MAPPING = {};
        let ROLES = [];
        let GUIDANCE_SECTIONS = [];

        async function loadAppData() {
            if (window.__APP_DATA__) {
                const d = window.__APP_DATA__;
                PAPER_DATA = d.paperData;
                WORKFLOW_MAPPING = d.workflowMapping;
                ROLES = d.roles;
                GUIDANCE_SECTIONS = d.guidanceSections;
                return;
            }
            const base = 'data/';
            const json = (path) =>
                fetch(base + path).then((r) => {
                    if (!r.ok) throw new Error(`${path}: ${r.status}`);
                    return r.json();
                });
            const [papers, workflow, roles, guidance] = await Promise.all([
                json('paper_data.json'),
                json('workflow_mapping.json'),
                json('roles.json'),
                json('guidance_sections.json')
            ]);
            PAPER_DATA = papers;
            WORKFLOW_MAPPING = workflow;
            ROLES = roles;
            GUIDANCE_SECTIONS = guidance;
        }

        const LEVEL_FILTER_OPTIONS = [
            { value: '1', label: 'Level 1' },
            { value: '2', label: 'Level 2' },
            { value: '3', label: 'Level 3' },
            { value: '4', label: 'Level 4' }
        ];
        const YEARS = [2022, 2023, 2024, 2025];

        // --- STATE MANAGEMENT ---
        let currentPage = 'home';
        function emptySearchFilters() {
            return {
                query: '',
                years: new Set(),
                levels: new Set(),
                contribution: new Set(),
                roles: new Set(),
                workflows: new Set(),
            };
        }
        let searchState = emptySearchFilters();

        function paperLevelBucket(p) {
            if (p.level === null || p.level === undefined || p.level === 'none') return 'none';
            return String(p.level);
        }

        function workflowTagStyle(stage) {
            const styles = {
                'Data Processing': 'background-color:#DAE8FC;color:#2D5A9E;border-color:#B8D3F7;',
                'Visual Mapping': 'background-color:#FFE6CC;color:#A15A00;border-color:#FFD1A3;',
                'View Transformation': 'background-color:#F8CECC;color:#9B2C2C;border-color:#F1B7B2;',
                Presentation: 'background-color:#D5E8D4;color:#2F6B2F;border-color:#BFE0BD;',
            };
            return styles[stage] || 'background-color:#EFF6FF;color:#1E40AF;border-color:#BFDBFE;';
        }

        function roleTagStyle(roleId) {
            const styles = {
                planner: 'background-color:#E1D5E7;color:#5B3D6E;border-color:#D2C1DD;',
                creator: 'background-color:#FFF2CC;color:#8A6D00;border-color:#F3E2A8;',
                reviewer: 'background-color:#B0E3E6;color:#1F6A70;border-color:#94D8DC;',
                context_manager: 'background-color:#E3DCCD;color:#6A5A3A;border-color:#D8CEBC;',
            };
            return styles[roleId] || 'background-color:#F1F5F9;color:#334155;border-color:#E2E8F0;';
        }

        function escapeHTML(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderTextWithLineBreaks(s) {
            return escapeHTML(s).replace(/\r?\n/g, '<br><br>');
        }

        function escapeRegExp(s) {
            return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function roleTagHTML(roleLabel) {
            const roleToId = {
                Planner: 'planner',
                Creator: 'creator',
                Reviewer: 'reviewer',
                'Context Manager': 'context_manager',
            };
            const roleId = roleToId[roleLabel];
            if (!roleId) return `<strong class="font-semibold text-slate-800">${escapeHTML(roleLabel)}</strong>`;
            return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs border align-middle" style="${roleTagStyle(roleId)}">${escapeHTML(roleLabel)}</span>`;
        }

        function levelTagHTML(levelLabel) {
            return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold border align-middle bg-violet-50 text-violet-800 border-violet-100">${escapeHTML(levelLabel)}</span>`;
        }

        function renderGuidanceDesc(desc) {
            const text = String(desc || '');
            const normalizedText = text.replace(
                /\bLevel\s+([1-4])\s+or\s+([1-4])\b/g,
                'Level $1 or Level $2'
            );
            const roleLabels = ['Planner', 'Creator', 'Reviewer', 'Context Manager'];
            const levelLabels = ['Level 1', 'Level 2', 'Level 3', 'Level 4'];
            const paperNames = [...new Set(PAPER_DATA.map((p) => (p.shorttitle || '').trim()).filter(Boolean))];
            const tokens = [...paperNames, ...roleLabels, ...levelLabels]
                .sort((a, b) => b.length - a.length);

            if (tokens.length === 0) return renderTextWithLineBreaks(text);

            const tokenPattern = tokens
                .map((token) => `(?<![A-Za-z0-9_])${escapeRegExp(token)}(?![A-Za-z0-9_])`)
                .join('|');
            const matcher = new RegExp(tokenPattern, 'g');

            let result = '';
            let lastIdx = 0;
            let match = matcher.exec(normalizedText);
            while (match) {
                const hit = match[0];
                result += escapeHTML(normalizedText.slice(lastIdx, match.index));
                if (roleLabels.includes(hit)) {
                    result += roleTagHTML(hit);
                } else if (levelLabels.includes(hit)) {
                    result += levelTagHTML(hit);
                } else {
                    result += `<strong class="font-semibold text-slate-800">${escapeHTML(hit)}</strong>`;
                }
                lastIdx = match.index + hit.length;
                match = matcher.exec(normalizedText);
            }
            result += escapeHTML(normalizedText.slice(lastIdx));
            return result.replace(/\r?\n/g, '<br><br>');
        }

        function paperCorpusBadgesHTML(paper) {
            const lv = paperLevelBucket(paper);
            const levelNum = lv === 'none' ? '' : paper.level;
            const levelSpan =
                lv === 'none'
                    ? ''
                    : `<span class="px-2 py-1 bg-violet-50 text-violet-800 text-xs font-semibold rounded-md border border-violet-100">Level ${levelNum}</span>`;
            const sys = paper.system
                ? `<span class="px-2 py-1 bg-amber-50 text-amber-800 text-xs font-semibold rounded-md border border-amber-100">System</span>`
                : '';
            const ds = paper.dataset
                ? `<span class="px-2 py-1 bg-teal-50 text-teal-800 text-xs font-semibold rounded-md border border-teal-100">Dataset</span>`
                : '';
            return [levelSpan, sys, ds].filter(Boolean).join('');
        }

        // --- RENDER HELPERS ---
        function generateCardHTML(paper) {
            const activeWorkflows = Object.entries(WORKFLOW_MAPPING).filter(([category, keys]) => 
                paper.workflows.some(w => keys.includes(w))
            ).map(([category]) => category);
            const rawAbstract = (paper.abstract || paper.summary || '').trim();
            const abstractText = rawAbstract ? escapeHTML(rawAbstract.replace(/\s+/g, ' ')) : '';

            const rolesHtml = paper.roles.map(r => 
                `<span class="px-2 py-0.5 rounded text-xs capitalize border" style="${roleTagStyle(r)}">${r.replace('_', ' ')}</span>`
            ).join('');

            const workflowsHtml = activeWorkflows.map(w => 
                `<span class="px-2 py-0.5 rounded text-xs border" style="${workflowTagStyle(w)}">${w}</span>`
            ).join('');
            const rolesSectionHtml = rolesHtml
                ? `<div>
                            <span class="text-slate-500 font-medium text-xs uppercase tracking-wider block mb-1">Roles Active</span>
                            <div class="flex flex-wrap gap-1">${rolesHtml}</div>
                        </div>`
                : '';
            const workflowsSectionHtml = workflowsHtml
                ? `<div>
                            <span class="text-slate-500 font-medium text-xs uppercase tracking-wider block mb-1">Workflow Stages</span>
                            <div class="flex flex-wrap gap-1">${workflowsHtml}</div>
                        </div>`
                : '';
            const abstractSectionHtml = abstractText
                ? `<div>
                            <span class="text-slate-500 font-medium text-xs uppercase tracking-wider block mb-1">Abstract</span>
                            <p class="text-slate-600 text-sm js-abstract-text" data-expanded="false" style="display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;">${abstractText}</p>
                            <button type="button" class="js-abstract-toggle mt-1 text-xs font-medium text-indigo-600 hover:text-indigo-800">More...</button>
                        </div>`
                : '';

            return `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 hover:shadow-md transition-shadow flex flex-col h-full">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-lg font-bold text-slate-800 leading-tight">${paper.fulltitle || paper.papername}</h3>
                        <a href="${paper.url}" target="_blank" rel="noopener noreferrer" class="text-indigo-600 hover:text-indigo-800 flex-shrink-0 ml-2">
                            ${icn('external-link', 'w-4 h-4')}
                        </a>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="px-2 py-1 bg-indigo-50 text-indigo-700 text-xs font-semibold rounded-md border border-indigo-100">
                            ${paper.year}
                        </span>
                        ${paperCorpusBadgesHTML(paper)}
                    </div>
                    <div class="flex-grow space-y-3 text-sm">
                        ${rolesSectionHtml}
                        ${workflowsSectionHtml}
                        ${abstractSectionHtml}
                    </div>
                </div>
            `;
        }

        function updateNavStyles() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = 'nav-btn px-3 py-2 rounded-md text-sm font-medium transition-colors flex items-center text-slate-600 hover:bg-slate-100 hover:text-slate-900';
            });
            const activeBtn = document.getElementById(`nav-${currentPage}`);
            if(activeBtn) {
                activeBtn.className = 'nav-btn px-3 py-2 rounded-md text-sm font-medium transition-colors flex items-center bg-indigo-50 text-indigo-700';
            }
        }

        // --- VIEWS ---
        function renderHome() {
            return `
                <div class="space-y-16 fade-in">
                    <!-- Hero -->
                    <section class="text-center py-16 bg-gradient-to-b from-indigo-50 to-white rounded-3xl border border-indigo-100 shadow-sm px-6">
                        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-6 tracking-tight">Exploring Agentic Visual Analytics</h1>
                        <p class="text-xl text-slate-600 max-w-3xl mx-auto leading-relaxed mb-2">A Co-Evolutionary Framework of Roles and Workflows. </p>
                        <p class="text-xl text-slate-600 max-w-3xl mx-auto leading-relaxed mb-8">Explore how LLM-driven agents autonomously plan, execute, evaluate, and iterate across the full visual analytics lifecycle.</p>
                        <div class="flex justify-center gap-4">
                            <button onclick="navigate('search')" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-indigo-700 transition-colors flex items-center">
                                ${icn('search', 'w-5 h-5 mr-2')} Explore Corpus
                            </button>
                            <button onclick="navigate('guidance')" class="bg-white text-indigo-600 border border-indigo-200 px-6 py-3 rounded-lg font-medium hover:bg-indigo-50 transition-colors flex items-center">
                                ${icn('book-open', 'w-5 h-5 mr-2')} Read Guidelines
                            </button>
                        </div>
                    </section>
                    
                    <!-- Workflow + Roles Overview -->
                    <section>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-center">
                                <h2 class="text-3xl font-bold text-slate-800 mb-4">Workflow Stages</h2>
                                <p class="text-slate-600 max-w-2xl mx-auto">The agentic framework spans across four key stages, transforming raw data into multi-modal interactive presentations.</p>
                                <div class="mt-4 flex flex-wrap justify-center gap-2">
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border" style="background-color:#DAE8FC;color:#2D5A9E;border-color:#B8D3F7;">Data Processing</span>
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border" style="background-color:#FFE6CC;color:#A15A00;border-color:#FFD1A3;">Visual Mapping</span>
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border" style="background-color:#F8CECC;color:#9B2C2C;border-color:#F1B7B2;">View Transformation</span>
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border" style="background-color:#D5E8D4;color:#2F6B2F;border-color:#BFE0BD;">Presentation</span>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-center">
                                <h2 class="text-3xl font-bold text-slate-800 mb-4">Agentic Roles</h2>
                                <p class="text-slate-600 max-w-2xl mx-auto">Four core roles coordinate across the visual analytics workflow to support multi-modal, human-AI collaboration.</p>
                                <div class="mt-4 flex flex-wrap justify-center gap-2">
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border" style="background-color:#E1D5E7;color:#5B3D6E;border-color:#D2C1DD;">Planner</span>
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border" style="background-color:#FFF2CC;color:#8A6D00;border-color:#F3E2A8;">Creator</span>
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border" style="background-color:#B0E3E6;color:#1F6A70;border-color:#94D8DC;">Reviewer</span>
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border" style="background-color:#E3DCCD;color:#6A5A3A;border-color:#D8CEBC;">Context Manager</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-8 bg-white border border-slate-200 rounded-2xl p-3 shadow-sm">
                            <img
                                src="figs/workflow-roles.svg"
                                alt="Workflow and agentic roles figure"
                                class="w-full h-auto rounded-xl"
                            />
                        </div>
                    </section>

                    <!-- Autonomy Levels -->
                    <section class="mb-16">
                         <div class="text-center mb-10">
                            <h2 class="text-3xl font-bold text-slate-800 mb-4">Autonomy Levels</h2>
                            <p class="text-slate-600 max-w-2xl mx-auto">Systems are categorized by their degree of agentic autonomy in visual analytics.</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                            <div class="border border-slate-200 rounded-xl p-6 bg-white border-t-4" style="border-top-color: #FDC828;">
                                <h3 class="text-xl font-bold text-slate-800 mb-2">Level 1</h3>
                                <p class="text-slate-600 text-sm"><span class="font-medium text-slate-700">Reactive single agent.</span> No task decomposition—a standalone Creator runs predefined skills in sequence (e.g. direct NL→vis mapping).</p>
                            </div>
                            <div class="border border-slate-200 rounded-xl p-6 bg-white border-t-4" style="border-top-color: #FF8A66;">
                                <h3 class="text-xl font-bold text-slate-800 mb-2">Level 2</h3>
                                <p class="text-slate-600 text-sm"><span class="font-medium text-slate-700">Predefined multi-agents.</span> Multiple roles (e.g. Planner + Creator) on a static, linear pipeline without reflective self-correction loops.</p>
                            </div>
                            <div class="border border-slate-200 rounded-xl p-6 bg-white border-t-4" style="border-top-color: #4DB6AC;">
                                <h3 class="text-xl font-bold text-slate-800 mb-2">Level 3</h3>
                                <p class="text-slate-600 text-sm"><span class="font-medium text-slate-700">Reflective hierarchical agents.</span> Dynamic task decomposition plus a Reviewer that iteratively refines outputs before they reach the user.</p>
                            </div>
                            <div class="border border-slate-200 rounded-xl p-6 bg-white border-t-4" style="border-top-color: #957DAE;">
                                <h3 class="text-xl font-bold text-slate-800 mb-2">Level 4</h3>
                                <p class="text-slate-600 text-sm"><span class="font-medium text-slate-700">Evolvable proactive agents.</span> Proactive self-organization: workflow topology shifts from environmental sensing and anticipation of user needs.</p>
                            </div>
                        </div>
                        <div class="mt-8 bg-white border border-slate-200 rounded-2xl p-3 shadow-sm">
                            <img
                                src="figs/levels.svg"
                                alt="Autonomy levels figure"
                                class="w-full h-auto rounded-xl"
                            />
                        </div>
                    </section>

                    <section>
                        <div class="bg-gradient-to-b from-indigo-50 to-white border border-indigo-100 rounded-3xl p-6 md:p-8 shadow-sm text-center">
                            <div class="flex flex-wrap justify-center gap-4">
                                <button onclick="navigate('search')" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-indigo-700 transition-colors flex items-center">
                                    ${icn('search', 'w-5 h-5 mr-2')} Explore Corpus
                                </button>
                                <button onclick="navigate('guidance')" class="bg-white text-indigo-600 border border-indigo-200 px-6 py-3 rounded-lg font-medium hover:bg-indigo-50 transition-colors flex items-center">
                                    ${icn('book-open', 'w-5 h-5 mr-2')} Read Guidelines
                                </button>
                            </div>
                        </div>
                    </section>
                </div>
            `;
        }

        function escapeDataAttr(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;');
        }

        function filterCheckbox(filterName, value, label, checked) {
            return `<label class="flex items-center gap-2.5 text-sm text-slate-700 cursor-pointer select-none py-0.5">
                <input type="checkbox" class="filter-cb shrink-0 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" data-filter="${filterName}" data-value="${escapeDataAttr(value)}" ${checked ? 'checked' : ''}/>
                <span>${label}</span>
            </label>`;
        }

        function renderSearchLayout() {
            const cb = filterCheckbox;
            const yearBoxes = YEARS.map((y) =>
                cb('year', y, y, searchState.years.has(String(y)))
            ).join('');
            const levelBoxes = LEVEL_FILTER_OPTIONS.map((o) =>
                cb('level', o.value, o.label, searchState.levels.has(o.value))
            ).join('');
            const contribBoxes = [
                cb('contribution', 'system', 'System', searchState.contribution.has('system')),
                cb('contribution', 'dataset', 'Dataset / Benchmark', searchState.contribution.has('dataset')),
            ].join('');
            const roleBoxes = ROLES.map((r) =>
                cb('role', r.id, r.name, searchState.roles.has(r.id))
            ).join('');
            const workflowBoxes = Object.keys(WORKFLOW_MAPPING)
                .map((w) => cb('workflow', w, w, searchState.workflows.has(w)))
                .join('');

            return `
                <div class="fade-in flex flex-col lg:flex-row gap-8">
                    <aside id="filter-sidebar" class="w-full lg:w-72 flex-shrink-0 space-y-6">
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                            <h2 class="font-bold text-slate-800 mb-4 flex items-center">${icn('filter', 'w-4 h-4 mr-2')} Filters</h2>
                            <p class="text-xs text-slate-500 mb-4">Within each section, checked items are combined with <span class="font-medium text-slate-600">OR</span>. Leave a section empty to show all.</p>
                            <div class="space-y-5">
                                <div><span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Year</span><div class="flex flex-col">${yearBoxes}</div></div>
                                <div><span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Autonomy level</span><div class="flex flex-col">${levelBoxes}</div></div>
                                <div><span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Contribution</span><div class="flex flex-col">${contribBoxes}</div></div>
                                <div><span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Role active</span><div class="flex flex-col">${roleBoxes}</div></div>
                                <div><span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Workflow stage</span><div class="flex flex-col">${workflowBoxes}</div></div>
                                <button type="button" onclick="clearFilters()" class="w-full py-2 text-sm text-slate-600 border border-slate-200 rounded-md hover:bg-slate-50 transition-colors">Clear filters</button>
                            </div>
                        </div>
                    </aside>
                    <!-- Main Area -->
                    <div class="flex-1">
                        <div class="relative mb-6">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">${icn('search', 'h-5 w-5 text-slate-400')}</div>
                            <input type="text" id="search-input" value="${searchState.query}" class="block w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm" placeholder="Search papers by title..." />
                        </div>
                        <div class="mb-6 flex justify-between items-center text-sm text-slate-500">
                            <span>Showing <strong id="results-count">0</strong> results</span>
                        </div>
                        <div id="search-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                    </div>
                </div>
            `;
        }

        function renderGuidance() {
            let contentHTML = GUIDANCE_SECTIONS.map(section => {
                let rulesHTML = section.guidelines.map(guide => {
                    const guideDescHTML = renderGuidanceDesc(guide.desc || '');
                    let papersHtml = '';
                    if(guide.papers && guide.papers.length > 0) {
                        const relatedPapers = guide.papers
                            .map((paperRef) => {
                                if (typeof paperRef === 'number') return PAPER_DATA.find((p) => p.id === paperRef);
                                return PAPER_DATA.find((p) => p.shorttitle === paperRef);
                            })
                            .filter(Boolean);
                        const visiblePapers = relatedPapers.slice(0, 2);
                        const hiddenPapers = relatedPapers.slice(2);
                        const hiddenSectionHtml = hiddenPapers.length > 0
                            ? `
                                <div class="js-extra-guidance-papers hidden mt-4">
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        ${hiddenPapers.map(p => generateCardHTML(p)).join('')}
                                    </div>
                                </div>
                                <button
                                    type="button"
                                    class="js-guidance-more mt-4 ml-auto block px-3 py-1.5 text-sm font-medium text-white bg-indigo-600 border border-indigo-600 rounded-md hover:bg-indigo-700"
                                    data-expanded="false"
                                >
                                    Expand Papers
                                </button>
                            `
                            : '';
                        papersHtml = `
                            <div class="border-t border-slate-100 pt-6 xl:border-t-0 xl:border-l xl:pt-0 xl:pl-6">
                                <h4 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">Exemplary papers in corpus</h4>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    ${visiblePapers.map(p => generateCardHTML(p)).join('')}
                                </div>
                                ${hiddenSectionHtml}
                            </div>
                        `;
                    }
                    return `
                        <div class="bg-white rounded-2xl p-8 border border-slate-200 shadow-sm relative overflow-hidden mb-6">
                            <div class="absolute top-0 left-0 w-2 h-full ${section.colorClass}"></div>
                            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8 items-start">
                                <div>
                                    <div class="bg-amber-50 border border-amber-200 p-5 rounded-xl mb-6">
                                        <h3 class="text-xl font-bold text-slate-800 mb-2">${guide.title}</h3>
                                        <p class="text-slate-700 font-medium leading-relaxed italic">"${guide.rule}"</p>
                                    </div>
                                    <p class="text-slate-600 leading-relaxed">${guideDescHTML}</p>
                                </div>
                                ${papersHtml}
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="space-y-5 mb-10">
                        <div class="border-b-2 border-slate-100 pb-2">
                            <h2 class="text-3xl font-bold text-slate-800 flex items-center">
                                ${icn(section.icon, 'w-6 h-6 mr-3 ' + section.textClass)} ${section.title}
                            </h2>
                            <p class="text-slate-500 mt-1 text-lg">${section.description}</p>
                        </div>
                        <div class="space-y-6">${rulesHTML}</div>
                    </div>
                `;
            }).join('');

            return `
                <div class="max-w-7xl mx-auto space-y-12 fade-in">
                    <div class="text-center py-16 bg-gradient-to-b from-indigo-50 to-white rounded-3xl border border-indigo-100 shadow-sm px-6">
                        <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Design Guidelines for Agentic Visual Analytics</h1>
                        <p class="text-xl text-slate-600">Six actionable guidelines addressing the fundamental trade-offs between agent autonomy and human-in-the-loop control.</p>
                    </div>
                    ${contentHTML}
                </div>
            `;
        }

        // --- CONTROLLER LOGIC ---
        function updateSearchGrid() {
            const grid = document.getElementById('search-grid');
            if(!grid) return;

            const filteredData = PAPER_DATA.filter((paper) => {
                const titleHaystack = (paper.fulltitle || paper.papername || '').toLowerCase();
                const matchQuery = titleHaystack.includes(searchState.query.toLowerCase());
                const matchYear =
                    searchState.years.size === 0 || searchState.years.has(String(paper.year));
                const matchLevel =
                    searchState.levels.size === 0 ||
                    searchState.levels.has(paperLevelBucket(paper));
                const c = searchState.contribution;
                const matchContribution =
                    c.size === 0 ||
                    (c.has('system') && paper.system) ||
                    (c.has('dataset') && paper.dataset);
                const matchRole =
                    searchState.roles.size === 0 ||
                    [...searchState.roles].some((r) => paper.roles.includes(r));
                const matchWorkflow =
                    searchState.workflows.size === 0 ||
                    [...searchState.workflows].some((w) => {
                        const requiredKeys = WORKFLOW_MAPPING[w];
                        return paper.workflows.some((x) => requiredKeys.includes(x));
                    });
                return (
                    matchQuery &&
                    matchYear &&
                    matchLevel &&
                    matchContribution &&
                    matchRole &&
                    matchWorkflow
                );
            });

            document.getElementById('results-count').innerText = filteredData.length;

            if(filteredData.length > 0) {
                grid.innerHTML = filteredData.map(p => generateCardHTML(p)).join('');
                grid.className = "grid grid-cols-1 md:grid-cols-2 gap-6";
            } else {
                grid.className = "";
                grid.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-xl border border-slate-200 border-dashed">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 text-slate-400 mb-4">
                            ${icn('search', 'w-8 h-8')}
                        </div>
                        <h3 class="text-lg font-medium text-slate-900 mb-1">No papers found</h3>
                        <p class="text-slate-500">Try adjusting your filters or search query.</p>
                    </div>
                `;
            }
        }

        function syncFilterSetsFromDOM() {
            const read = (name) =>
                new Set(
                    [...document.querySelectorAll(`#filter-sidebar input.filter-cb[data-filter="${name}"]:checked`)].map(
                        (el) => el.dataset.value
                    )
                );
            searchState.years = read('year');
            searchState.levels = read('level');
            searchState.contribution = read('contribution');
            searchState.roles = read('role');
            searchState.workflows = read('workflow');
        }

        function clearFilters() {
            searchState = emptySearchFilters();
            const inp = document.getElementById('search-input');
            if (inp) inp.value = '';
            document.querySelectorAll('#filter-sidebar input.filter-cb').forEach((cb) => {
                cb.checked = false;
            });
            updateSearchGrid();
        }

        function attachSearchListeners() {
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchState.query = e.target.value;
                updateSearchGrid();
            });
            document.getElementById('filter-sidebar').addEventListener('change', (e) => {
                if (!e.target.classList.contains('filter-cb')) return;
                syncFilterSetsFromDOM();
                updateSearchGrid();
            });
            document.getElementById('search-grid').addEventListener('click', (e) => {
                const toggle = e.target.closest('.js-abstract-toggle');
                if (!toggle) return;
                const container = toggle.closest('div');
                const p = container ? container.querySelector('.js-abstract-text') : null;
                if (!p) return;
                const expanded = p.dataset.expanded === 'true';
                if (expanded) {
                    p.style.display = '-webkit-box';
                    p.style.webkitBoxOrient = 'vertical';
                    p.style.webkitLineClamp = '2';
                    p.style.overflow = 'hidden';
                    p.dataset.expanded = 'false';
                    toggle.textContent = 'More...';
                } else {
                    p.style.display = 'block';
                    p.style.webkitLineClamp = 'unset';
                    p.style.overflow = 'visible';
                    p.dataset.expanded = 'true';
                    toggle.textContent = 'Less';
                }
            });
        }

        function attachGuidanceListeners() {
            const contentDiv = document.getElementById('app-content');
            if (!contentDiv || contentDiv.dataset.guidanceBound === 'true') return;
            contentDiv.dataset.guidanceBound = 'true';
            contentDiv.addEventListener('click', (e) => {
                const toggle = e.target.closest('.js-guidance-more');
                if (!toggle) return;
                const wrapper = toggle.closest('div');
                const hidden = wrapper ? wrapper.querySelector('.js-extra-guidance-papers') : null;
                if (!hidden) return;
                const expanded = toggle.dataset.expanded === 'true';
                if (expanded) {
                    hidden.classList.add('hidden');
                    toggle.dataset.expanded = 'false';
                    toggle.textContent = 'Expand Papers';
                } else {
                    hidden.classList.remove('hidden');
                    toggle.dataset.expanded = 'true';
                    toggle.textContent = 'Collapse Papers';
                }
            });
        }

        function navigate(page) {
            currentPage = page;
            updateNavStyles();
            const contentDiv = document.getElementById('app-content');
            
            if (page === 'home') {
                contentDiv.innerHTML = renderHome();
            } else if (page === 'search') {
                contentDiv.innerHTML = renderSearchLayout();
                attachSearchListeners();
                updateSearchGrid();
            } else if (page === 'guidance') {
                contentDiv.innerHTML = renderGuidance();
                attachGuidanceListeners();
            }
            window.scrollTo(0,0);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            hydrateDataIcons(document);
            const contentDiv = document.getElementById('app-content');
            try {
                await loadAppData();
                navigate('home');
            } catch (e) {
                console.error(e);
                contentDiv.innerHTML = `
                    <div class="rounded-xl border border-red-200 bg-red-50 p-8 text-center text-red-800">
                        <p class="font-semibold mb-2">Could not load site data</p>
                        <p class="text-sm text-red-700">Missing <code class="bg-red-100 px-1 rounded">js/site-bundle.js</code>. Run <code class="bg-red-100 px-1 rounded">npm run build</code> in the <code class="bg-red-100 px-1 rounded">website</code> folder, or <code class="bg-red-100 px-1 rounded">npm run build:bundle</code> after <code class="bg-red-100 px-1 rounded">build:data</code>.</p>
                    </div>`;
            }
        });

    </script>
</body>
</html>
